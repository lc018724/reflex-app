name: Reflex
options:
  bundleIdPrefix: com.lucky
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  Reflex:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Reflex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucky.Reflex
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/Reflex/Info.plist

  ReflexTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/ReflexTests
    dependencies:
      - target: Reflex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucky.ReflexTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Reflex.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Reflex"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Reflex:
    build:
      targets:
        Reflex: all
        ReflexTests: [test]
    test:
      targets:
        - ReflexTests
